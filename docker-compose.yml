version: '3.8'

services:
  # Servicio de Base de Datos (PostgreSQL)
  db:
    image: postgres:15
    volumes:
      # Persistencia: Esto asegura que los datos sobrevivan si apagas el contenedor
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=tienda_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret_password

  # Servicio de tu API Django
  web:
    build: ./tienda_app
    # CAMBIO 1: Usamos Gunicorn en lugar de runserver
    # 'Tienda' debe ser el nombre de la carpeta donde esta tu wsgi.py
    command: gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000
    volumes:
      # Hot-Reload: Mapeamos la carpeta actual para que los cambios de código se reflejen sin reiniciar
      - .:/app
      # Volumen para estáticos
      - tienda-static:/app/staticfiles
    depends_on:
      - db
    environment:
      # Estas variables deben coincidir con lo que espera tu settings.py
      - DB_NAME=tienda_db
      - DB_USER=postgres
      - DB_PASSWORD=secret_password
      - DB_HOST=db  # ¡OJO! Aquí usamos el nombre del servicio 'db' como host
      - DB_PORT=5432
    # NOTA: Ya no hay seccion 'ports' aqui. Django esta aislado.

  # STRANGLER PATTERN: Microservicio Flask para v2/comprar
  pagos_flask:
    build: ./microservicio_pagos
    command: gunicorn app:app --bind 0.0.0.0:5000
    volumes:
      - ./microservicio_pagos:/app
    # Flask está aislado, solo accesible via Nginx

  # CAMBIO 2: Agregamos el servicio Nginx
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"  # Nginx es el unico que da la cara a internet
    volumes:
      # Inyectamos nuestro archivo de configuracion en el contenedor
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # Volumen compartido para servir estáticos
      - tienda-static:/app/staticfiles:ro
    depends_on:
      - web
      - pagos_flask

# Definición del volumen persistente
volumes:
  postgres_data:
  tienda-static: