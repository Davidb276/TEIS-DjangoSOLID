# nginx/nginx.conf

# 1. BACKEND 1: Django v1 (Monolito Original)
# El nombre 'tienda-web' debe coincidir con el nombre del contenedor
upstream django_v1 {
    server tienda-web:8000;
}

# BACKEND 2: Flask v2 (Microservicio - El Estrangulador)
upstream flask_v2 {
    server pagos_flask:5000;
}

server {
    # Nginx escuchara en el puerto web estandar (80)
    listen 80;

    # Ignorar logs de favicon para no saturar el servidor
    location = /favicon.ico { access_log off; log_not_found off; }

    # Servir archivos estáticos directamente desde el volumen compartido
    location /static/ {
        alias /app/staticfiles/;
    }

    # RUTA NUEVA (v2): El endpoint de compra ahora va a Flask
    # Esto es el "estrangulamiento" - redirigimos la funcionalidad crítica
    location /api/v2/comprar {
        proxy_pass http://flask_v2;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # RUTA VIEJA (v1): Todo lo demás sigue siendo Django
    # Esto asegura que no rompemos la funcionalidad existente
    location / {
        proxy_pass http://django_v1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Nota Arquitectonica: En el futuro, cuando Flask v2 sea estable,
    # podemos mover más endpoints de Django a Flask incrementalmente.
}
